<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal — JH+ Shaheen Academy</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../assets/portal-shell.css">
</head>
<body>

<div class="jh-sidebar-overlay" id="jhSidebarOverlay"></div>

<aside class="jh-sidebar" id="jhSidebar">
  <div class="jh-sidebar-brand">
    <div class="mark">J</div>
    <div>
      <div class="label">JH<span>+</span> Shaheen</div>
      <div class="tag">Student Portal</div>
    </div>
  </div>

  <nav class="jh-nav">
    <button class="jh-nav-link active" data-view="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
      Dashboard
    </button>
    <button class="jh-nav-link" data-view="attendance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Attendance
    </button>
    <button class="jh-nav-link" data-view="marks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Marks
    </button>
    <button class="jh-nav-link" data-view="results">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M3 4h18l-1.5 9.5a2 2 0 0 1-2 1.5H6.5a2 2 0 0 1-2-1.5L3 4Z"/></svg>
      Results
    </button>
    <button class="jh-nav-link" data-view="assignments">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>
      Assignments
    </button>
    <button class="jh-nav-link" data-view="downloads">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Downloads
    </button>
    <button class="jh-nav-link" data-view="qbank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
      Question Bank
    </button>
    <button class="jh-nav-link" data-view="announcements">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3Z"/><path d="M11.6 16.8a3 3 0 0 1-5.8-1.4"/></svg>
      Announcements
    </button>
    <div class="jh-nav-section">Account</div>
    <button class="jh-nav-link" data-view="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      Profile
    </button>
  </nav>

  <div class="jh-sidebar-foot">
    <div class="avatar" id="jhUserAvatar">?</div>
    <div class="who">
      <div class="n" id="jhUserName">Loading…</div>
      <div class="r" id="jhUserRole">student</div>
    </div>
    <button class="logout-btn" id="jhLogoutBtn" title="Sign out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </button>
  </div>
</aside>

<main class="jh-main">
  <div class="jh-topbar">
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="jh-mobile-toggle" id="jhMobileToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div>
        <h1 id="viewTitle">Dashboard</h1>
        <div class="sub" id="viewSub">Welcome back — here's your overview.</div>
      </div>
    </div>
  </div>

  <div id="viewContent">
    <div class="jh-loading"><div class="jh-spin"></div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/portal-shell.js"></script>
<script src="assets/student-portal.js"></script>
</body>
</html>
