  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <!-- Arabic ج letter stylized -->
