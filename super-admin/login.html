<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Login — Jamia Hifz Plus</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../assets/portal-login.css">
</head>
<body>

<div class="login-bg" style="background-image:url('../images/jh-login-bg.png');"></div>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <div class="mark">J</div>
      <div class="brandname">Jamia Hifz Plus</div>
      <div class="portal-tag">Super Admin Portal</div>
    </div>

    <div id="loginMsg" class="login-msg"></div>

    <form id="loginForm" autocomplete="on">
      <div class="login-field">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="login-input" placeholder="you@example.com" autocomplete="username" required>
      </div>

      <div class="login-field">
        <label for="password">Password</label>
        <div class="login-input-wrap">
          <input type="password" id="password" class="login-input" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" id="togglePw" class="login-input-icon" aria-label="Show password" title="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="login-row">
        <label class="login-remember">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <button type="button" id="forgotBtn" class="login-forgot">Forgot password?</button>
      </div>

      <button type="submit" id="submitBtn" class="login-btn login-btn-primary">Sign in to Super Admin Portal</button>
    </form>

    <div class="login-divider">OR</div>

    <button type="button" id="googleBtn" class="login-btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.52 12.27c0-.79-.07-1.54-.2-2.27H12v4.3h6.47a5.54 5.54 0 0 1-2.4 3.63v3.02h3.86c2.26-2.09 3.59-5.17 3.59-8.68Z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.07 7.93-2.9l-3.86-3.02c-1.07.72-2.45 1.15-4.07 1.15-3.13 0-5.78-2.11-6.73-4.96H1.27v3.12A11.99 11.99 0 0 0 12 24Z"/><path fill="#FBBC05" d="M5.27 14.27a7.2 7.2 0 0 1 0-4.54V6.6H1.27a11.99 11.99 0 0 0 0 10.79l4-3.12Z"/><path fill="#EA4335" d="M12 4.77c1.77 0 3.35.61 4.6 1.8l3.42-3.42A11.5 11.5 0 0 0 12 0 11.99 11.99 0 0 0 1.27 6.6l4 3.13c.95-2.85 3.6-4.96 6.73-4.96Z"/></svg>
      Continue with Google
    </button>

    <div class="login-footer">
      Not a super admin? <a href="../index.html">Return to homepage</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>window.JH_PORTAL_ROLE = "super_admin";</script>
<script src="../assets/js/portal-login.js"></script>
</body>
</html>
