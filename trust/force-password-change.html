<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set a New Password — Jamia Hifz Plus</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="../assets/portal-login.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="mark">J</div>
      <div class="brandname">Jamia Hifz Plus</div>
      <div class="portal-tag">Set New Password</div>
    </div>

    <p style="color:var(--text-dim);font-size:13.5px;line-height:1.6;margin-bottom:22px;text-align:center;">
      For security, you must set a new password before you can access the Trust Member Portal.
    </p>

    <div id="loginMsg" class="login-msg"></div>

    <form id="pwForm">
      <div class="login-field">
        <label for="pw1">New Password</label>
        <div class="login-input-wrap">
          <input type="password" id="pw1" class="login-input" placeholder="Minimum 8 characters" autocomplete="new-password" required minlength="8">
          <button type="button" id="togglePw1" class="login-input-icon" aria-label="Show password" title="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="login-field">
        <label for="pw2">Confirm New Password</label>
        <div class="login-input-wrap">
          <input type="password" id="pw2" class="login-input" placeholder="Re-enter password" autocomplete="new-password" required minlength="8">
        </div>
      </div>

      <button type="submit" id="submitBtn" class="login-btn login-btn-primary" style="margin-top:8px;">Set Password &amp; Continue</button>
    </form>

    <div class="login-footer">
      <a href="#" id="logoutLink">Sign out instead</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
(function () {
  const ROLE = "trust_member";

  document.addEventListener("DOMContentLoaded", async () => {
    // Must be logged in to be here at all, regardless of must_change_password.
    const session = await jhGetSession();
    if (!session) {
      window.location.href = "login.html";
      return;
    }

    const pw1 = document.getElementById("pw1");
    const pw2 = document.getElementById("pw2");
    const toggle1 = document.getElementById("togglePw1");
    const form = document.getElementById("pwForm");
    const submitBtn = document.getElementById("submitBtn");
    const msg = document.getElementById("loginMsg");
    const logoutLink = document.getElementById("logoutLink");

    toggle1.addEventListener("click", () => {
      pw1.type = pw1.type === "password" ? "text" : "password";
    });

    logoutLink.addEventListener("click", async (e) => {
      e.preventDefault();
      await jhLogout("login.html");
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.className = "login-msg";

      if (pw1.value.length < 8) {
        msg.className = "login-msg show error";
        msg.textContent = "Password must be at least 8 characters.";
        return;
      }
      if (pw1.value !== pw2.value) {
        msg.className = "login-msg show error";
        msg.textContent = "Passwords do not match.";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spin"></span>Saving…';

      const result = await jhUpdatePassword(pw1.value);

      if (!result.success) {
        msg.className = "login-msg show error";
        msg.textContent = result.error || "Could not update password.";
        submitBtn.disabled = false;
        submitBtn.textContent = "Set Password & Continue";
        return;
      }

      msg.className = "login-msg show success";
      msg.textContent = "Password updated. Redirecting…";
      window.location.href = JH_ROLE_HOME[ROLE] || "/index.html";
    });
  });
})();
</script>
</body>
</html>
